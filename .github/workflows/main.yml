name: CI — Build & Delivery

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (Java 17)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven tests
        run: mvn verify --batch-mode --no-transfer-progress -Dspring.profiles.active=test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'sk-ci-placeholder-no-real-calls' }}
          SPRING_PROFILES_ACTIVE: test

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: target/surefire-reports/
          retention-days: 7

      - name: Test summary
        if: always()
        run: |
          echo "## Test Sonuçları" >> $GITHUB_STEP_SUMMARY
          if ls target/surefire-reports/*.xml 2>/dev/null | grep -q .; then
            TESTS=$(grep -h 'tests=' target/surefire-reports/*.xml | \
              grep -oP 'tests="\K[0-9]+' | awk '{s+=$1} END {print s}')
            FAILS=$(grep -h 'failures=' target/surefire-reports/*.xml | \
              grep -oP 'failures="\K[0-9]+' | awk '{s+=$1} END {print s}')
            echo "| Toplam | Başarısız |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
            echo "| $TESTS | $FAILS    |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Test raporu bulunamadı." >> $GITHUB_STEP_SUMMARY
          fi

  # ── 2. Build (Frontend) ──────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── 3. Deploy → GHCR (push to main only) ─────────────────────────────────────
  deploy:
    name: Docker → GHCR
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
