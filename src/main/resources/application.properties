# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5434/smart_budget_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App
spring.application.name=smart-budgeting-app

# Multipart dosya yükleme limitleri
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Jackson — LocalDate'i timestamp değil ISO-8601 string olarak işle
spring.jackson.serialization.write-dates-as-timestamps=false

# LangChain4j — OpenAI (GPT-4o-mini)
# API anahtarını ortam değişkeni olarak ver: export OPENAI_API_KEY=sk-...
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:your-api-key-here}
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.max-tokens=2048

# Alternatif: Ollama ile yerel Llama 3 kullanmak için pom.xml'de
# langchain4j-ollama-spring-boot-starter ekleyip aşağıdaki ayarları kullanın:
# langchain4j.ollama.chat-model.base-url=http://localhost:11434
# langchain4j.ollama.chat-model.model-name=llama3
