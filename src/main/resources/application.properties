# PostgreSQL Datasource
spring.datasource.url=jdbc:postgresql://localhost:5434/smart_budget_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Varsayılan: update (local geliştirme).
# CI'da DDL_AUTO=validate env değişkeni set edilir — schema tutarsızlıklarını
# üretime taşımadan yakalar.
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App
spring.application.name=smart-budgeting-app

# Multipart dosya yükleme limitleri
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Jackson — LocalDate'i timestamp değil ISO-8601 string olarak işle
spring.jackson.serialization.write-dates-as-timestamps=false

# ─────────────────────────────────────────────────────────────────────────────
# Hibrit MCP Mimarisi — LLM Kullanımı
# ─────────────────────────────────────────────────────────────────────────────
# ┌─────────────────┬──────────────┬──────────────────────────────────────────┐
# │ Bileşen         │ LLM Kullanır │ Açıklama                                 │
# ├─────────────────┼──────────────┼──────────────────────────────────────────┤
# │ Dashboard       │ HAYIR        │ Kural tabanlı AnalyticsService           │
# │ MCP tools       │ HAYIR        │ Aynı kural tabanlı mantık                │
# │ PDF Upload      │ HER ZAMAN    │ Metin → JSON (GPT-4o-mini, sahte veri yok│
# └─────────────────┴──────────────┴──────────────────────────────────────────┘
# API anahtarı .env dosyasından (OPENAI_API_KEY) otomatik yüklenir.

# LangChain4j — OpenAI (GPT-4o-mini) — yalnızca PDF extraction için
# API anahtarı .env dosyası üzerinden SmartBudgetApplication.main() tarafından
# sistem özelliğine aktarılır; eksik olursa uygulama başlarken hata fırlatır.
# Default: placeholder — Spring context ayağa kalkar ama gerçek çağrı yapılmaz.
# CI'da OPENAI_API_KEY env var (GitHub Secret) bu değerin üzerine yazar.
langchain4j.open-ai.chat-model.api-key=${OPENAI_API_KEY:sk-ci-placeholder-no-real-calls}
langchain4j.open-ai.chat-model.model-name=gpt-4.1-mini
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.max-tokens=8192
# OpenAI API ağ timeout — PDF extraction prompt'u 60s varsayılandan uzun sürebilir
langchain4j.open-ai.chat-model.timeout=PT180S

# Spring MVC: async controller thread'inin toplam bekleme süresi (ms)
# LangChain4j timeout'undan (180s) biraz fazla bırak
spring.mvc.async.request-timeout=200000

# ─────────────────────────────────────────────────────────────────────────────
# MCP Server — Serena Finansal Araçları
# ─────────────────────────────────────────────────────────────────────────────
# Claude Desktop bağlantısı için claude_desktop_config.json'a ekle:
#   { "mcpServers": { "serena-budget": { "url": "http://localhost:8080/mcp/sse" } } }
#
# Claude Code bağlantısı için:
#   claude mcp add serena-budget --url http://localhost:8080/mcp/sse
#
# MCP tool çağrılarını debug seviyesinde logla
logging.level.com.mali.smartbudget.mcp=DEBUG
logging.level.io.modelcontextprotocol=INFO

# ─────────────────────────────────────────────────────────────────────────────
# Actuator — Observability
# ─────────────────────────────────────────────────────────────────────────────
# Güvenlik: actuator endpoint'leri ana port (8080) yerine ayrı bir port'ta (8081)
# sunulur. Spring Security filtre zinciri sadece 8080'e uygulandığından 8081
# otomatik olarak uygulama güvenliğinden bağımsız çalışır.
management.server.port=8081
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
# /actuator/info içeriği
management.info.env.enabled=true
info.app.name=Smart Budgeting App
info.app.version=1.0-SNAPSHOT
info.app.description=Kişisel bütçe yönetimi ve PDF ekstre analiz uygulaması

# ─────────────────────────────────────────────────────────────────────────────
# JWT Güvenlik Ayarları
# ─────────────────────────────────────────────────────────────────────────────
# Üretimde bu değeri ortam değişkeni ile override et: export JWT_SECRET=...
# Değer en az 256-bit (32 byte) Base64 kodlanmış bir string olmalı.
jwt.secret=${JWT_SECRET:c21hcnQtYnVkZ2V0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1NmJpdA==}
# Token geçerlilik süresi (ms) — varsayılan 24 saat
jwt.expiration=${JWT_EXPIRATION:86400000}

