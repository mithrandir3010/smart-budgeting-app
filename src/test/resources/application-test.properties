# ─── Veritabanı: H2 in-memory (test izolasyonu) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=c21hcnQtYnVkZ2V0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1NmJpdA==
jwt.expiration=86400000

# ─── PDF çıkarımı: Entegrasyon testlerinde LLM bean başlatılır ama çağrılmaz ──
# @PostConstruct doğrulamasını geçmesi için sk- önekiyle başlamalı.
langchain4j.open-ai.chat-model.api-key=sk-test-placeholder-for-integration-tests
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.max-tokens=2048

# ─── Log seviyesi (test çıktısını temiz tut) ─────────────────────────────────
logging.level.root=WARN
logging.level.com.mali.smartbudget=INFO
logging.level.org.springframework.security=DEBUG
