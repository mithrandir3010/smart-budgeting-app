version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: smart_budget_db
    environment:
      POSTGRES_DB: smart_budget_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
