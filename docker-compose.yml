version: '3.8'

# macOS (Docker Desktop): Spring Boot host'ta çalışır, sadece PostgreSQL container'da.
# Host'tan container'a erişim: localhost:5434 (doğrudan çalışır, Linux'tan farkı yok).
# Container içinden host'a erişim gerekirse: host.docker.internal kullan (Linux'ta extra-hosts gerekir).

services:
  postgres:
    image: postgres:15
    container_name: smart_budget_db
    environment:
      POSTGRES_DB: smart_budget_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
