# Production overrides — Railway'de SPRING_PROFILES_ACTIVE=prod set edilince devreye girer.
# Bu dosyadaki değerler application.properties'teki eşdeğer satırların üzerine yazar.

# Schema değişikliğini Flyway/Liquibase yönetsin; Hibernate elle dokunmasın.
spring.jpa.hibernate.ddl-auto=validate

# SQL logları production'da gereksiz I/O ve log hacmi yaratır.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# MCP debug logları production'da sessizleştirilir.
logging.level.com.mali.smartbudget.mcp=WARN
