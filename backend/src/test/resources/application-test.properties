# ─── Veritabanı: H2 in-memory (test izolasyonu) ──────────────────────────────
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Flyway — H2 ile PostgreSQL SQL uyumsuz, testlerde ddl-auto=create-drop yeterli
spring.flyway.enabled=false

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=c21hcnQtYnVkZ2V0LXN1cGVyLXNlY3JldC1rZXktZm9yLWp3dC1zaWduaW5nLTI1NmJpdA==
# 24 saat — testlerin token süresinden etkilenmemesi için production 15dk değerini override eder
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ─── PDF çıkarımı: Entegrasyon testlerinde LLM bean başlatılır ama çağrılmaz ──
# @PostConstruct doğrulamasını geçmesi için sk- önekiyle başlamalı.
langchain4j.open-ai.chat-model.api-key=sk-test-placeholder-for-integration-tests
langchain4j.open-ai.chat-model.model-name=gpt-4o-mini
langchain4j.open-ai.chat-model.temperature=0.0
langchain4j.open-ai.chat-model.max-tokens=2048

# ─── Actuator — yönetim sunucusunu rastgele porta bağla (8081 çakışmasını önle) ─
management.server.port=0

# ─── Email (AWS SES) — EmailService @MockBean; SesClient bean oluşur ama çağrılmaz ──
aws.ses.region=eu-central-1
app.base-url=http://localhost:5173

# ─── Rate Limiting — mevcut testlerin 10-istek limitine çarpmasını önle ──────
# RateLimitIntegrationTest kendi @SpringBootTest properties ile override eder.
app.rate-limit.enabled=false

# ─── Log seviyesi (test çıktısını temiz tut) ─────────────────────────────────
logging.level.root=WARN
logging.level.com.mali.smartbudget=INFO
logging.level.org.springframework.security=DEBUG
